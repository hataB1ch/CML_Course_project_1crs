<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Команды | CS2 Portal</title>
    <link rel="stylesheet" href="style/style.css" />
</head>
<body class="auth-layout">
    <header>
        <a class="logo" href="index.html" aria-label="На главную">
            <div class="logo__icon">
                <img src="logos/site-mark.svg" alt="" aria-hidden="true" />
            </div>
            <span>CS2 PORTAL</span>
        </a>

        <nav id="nav">
            <a href="index.html">Главная</a>
            <a href="ratings.html">Рейтинги</a>
            <a href="tournaments.html">Турниры</a>
            <a href="teams.html" class="active">Команды</a>
            <a href="about.html">О портале</a>
            <a href="contacts.html">Контакты</a>
        </nav>

        <div class="header-right">
            <div class="profile-menu">
                <button class="user-btn" id="profile-btn" aria-label="Профиль">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </button>
                <div class="profile-dropdown" id="profile-dropdown">
                    <a href="login.html">Войти</a>
                    <a href="register.html">Регистрация</a>
                </div>
            </div>
            <button class="burger" id="burger" aria-label="Меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="teams-page">
        <section class="teams-intro">
            <h1>Все Команды</h1>
            <p>Команды из текущих рейтингов HLTV и Valve</p>
        </section>

        <section class="teams-tools">
            <p id="teams-count">Команд: 0</p>
        </section>

        <section id="teams-grid" class="teams-cards-grid"></section>
    </main>

    <div class="team-modal" id="team-modal" aria-hidden="true">
        <div class="team-modal__backdrop" data-close-modal></div>
        <div class="team-modal__content" role="dialog" aria-modal="true" aria-labelledby="team-modal-title">
            <button class="team-modal__close" id="team-modal-close" aria-label="Закрыть">×</button>
            <div class="team-modal__top">
                <img id="team-modal-logo" class="team-modal__logo" alt="" loading="lazy" />
                <div class="team-modal__top-text">
                    <h2 id="team-modal-title"></h2>
                    <p id="team-modal-region"></p>
                </div>
            </div>
            <ul id="team-modal-players"></ul>
        </div>
    </div>

    <footer>
        <div>
            <div class="logo">
                <div class="logo__icon">
                    <a href="index.html" aria-label="На главную">
                        <img src="logos/site-mark.svg" alt="" aria-hidden="true" />
                    </a>
                </div>
                <span>© 2026 CS2 Portal • Курсовой проект • <a href="#">Еремейчик Родион Павлович</a></span>
            </div>
        </div>
        <nav>
            <a href="https://github.com/hataB1ch">GitHub</a>
            <a href="https://hltv.org">HLTV.org</a>
            <a href="https://liquipedia.net/counterstrike/">Liquipedia</a>
            <a href="contacts.html">Контакты</a>
            <a href="about.html">О портале</a>
        </nav>
    </footer>

    <script src="script/script.js"></script>
    <script src="script/rankings-teams.js"></script>
</body>
</html>
